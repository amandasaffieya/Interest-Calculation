<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interest Calculator</title>
    <style>
body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    color: #e0e0e0;
    margin: 0;
    padding: 20px;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

h1 {
    color: #bbdb44;
    font-size: 5em;
    text-align: center;
    margin-bottom: 25px;
    margin-right: 2em;
    font-weight: 700;
    letter-spacing: 1px;
    text-shadow: 0 4px 10px rgba(0, 0, 0, 0.6);
    
}

form {
    background: rgba(45, 45, 45, 0.85);
    max-width: 420px;
    width: 100%;
    padding: 35px;
    border-radius: 16px;
    box-shadow: 0 15px 40px rgba(0, 0, 0, 0.6);
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    transition: transform 0.3s ease, box-shadow 0.3s ease;
}

form:hover {
    transform: translateY(-5px);
    box-shadow: 0 20px 50px rgba(0, 0, 0, 0.7);
}

label {
    font-size: 1.1em;
    font-weight: 600;
    color: #f5f5f5;
    align-self: start;
    margin-bottom: 8px;
    margin-top: 15px;
}

input {
    width: 100%;
    max-width: 300px;
    padding: 12px;
    font-size: 1.1em;
    border: 1px solid #666;
    border-radius: 10px;
    background-color: rgba(30, 30, 30, 0.9);
    color: #ffffff;
    transition: all 0.3s ease;
    box-sizing: border-box;
}

input:focus {
    outline: none;
    border-color: #bbdb44;
    box-shadow: 0 0 10px rgba(187, 219, 68, 0.5);
    background-color: rgba(40, 40, 40, 0.95);
}

button {
    background: linear-gradient(135deg, #bbdb44, #a8c93a);
    color: #1a1a1a;
    font-size: 1.2em;
    font-weight: 600;
    border: none;
    border-radius: 10px;
    padding: 14px 28px;
    cursor: pointer;
    margin-top: 30px;
    transition: all 0.3s ease;
    box-shadow: 0 6px 12px rgba(0, 0, 0, 0.3);
}

button:hover {
    background: linear-gradient(135deg, #c7e34f, #b5d642);
    transform: translateY(-3px);
    box-shadow: 0 10px 18px rgba(0, 0, 0, 0.4);
}

button:active {
    transform: translateY(0);
}

#total {
    font-size: 1.3em;
    margin-top: 25px;
    color: #dddddd;
    text-align: center;
}

#total-amount {
    color: #bbdb44;
    font-weight: 700;
    font-size: 1.5em;
    display: block;
    margin-top: 10px;
}
</style>

<script>function calculate() {
    const totalAmount = document.getElementById("total-amount");
    const principalInput = document.getElementById("principal");
    const rateInput = document.getElementById("rate");
    const yearsInput = document.getElementById("years");

    let principal = Number(principalInput.value);
    let rate = Number(rateInput.value) / 100;   // clearer
    let years = Number(yearsInput.value);

    if (principal < 0 || isNaN(principal)) {
        principal = 0;
        principalInput = 0;
    }
    if (rate < 0 || isNaN(rate)) {
        rate = 0; 
        rateInput = 0;
    }
    if (years < 0 || isNaN(years)) {
        years = 0; 
        yearsInput = 0;
    }

    // Compound interest formula: A = P * (1 + r)^t
    const result = principal * Math.pow((1 + rate), years);

    totalAmount.textContent = result.toLocaleString(undefined, {
        style: "currency",
        currency: "MYR"   // use MYR for Malaysian Ringgit
    });
}
</script>
</head>
<body>
    <h1>Interest Calculator</h1>

    <form action="">
        <label for="principal">Principal Amount: </label>
        <input type="number" id="principal">

        <label for="rate">Interest rate:</label>
        <input type="number" id="rate">

        <label for="years">Years:</label>
        <input type="number" id="years">

        <button type="button" onclick="calculate()">submit</button>

        <p id="total">Total: <span id="total-amount">$0.00</span></p>

    </form>
</body>
</html>
